services:
  postgres:
    image: postgres:16-alpine
    container_name: aquantis-postgres
    environment:
      POSTGRES_USER: aquantis
      POSTGRES_PASSWORD: aquantis_pass
      POSTGRES_DB: aquantis_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aquantis"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aquantis-backend
    environment:
      DB_USER: aquantis
      DB_PASSWORD: aquantis_pass
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aquantis_db
      PORT: 5000
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: aquantis-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
