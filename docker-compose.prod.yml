services:
  postgres:
    image: postgres:16-alpine
    container_name: aquantis-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-aquantis}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_this_in_production}
      POSTGRES_DB: ${DB_NAME:-aquantis_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aquantis"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - aquantis-network

  backend:
    image: ${DOCKER_REGISTRY:-docker.io}/${IMAGE_NAME:-your-username/aquantis}-backend:${TAG:-latest}
    container_name: aquantis-backend
    environment:
      DB_USER: ${DB_USER:-aquantis}
      DB_PASSWORD: ${DB_PASSWORD:-change_this_in_production}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-aquantis_db}
      PORT: 5000
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - aquantis-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ${DOCKER_REGISTRY:-docker.io}/${IMAGE_NAME:-your-username/aquantis}-frontend:${TAG:-latest}
    container_name: aquantis-frontend
    ports:
      - "${FRONTEND_PORT:-80}:3000"
    environment:
      - VITE_API_URL=${API_URL:-http://localhost:5000/api}
    depends_on:
      - backend
    restart: always
    networks:
      - aquantis-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  aquantis-network:
    driver: bridge
