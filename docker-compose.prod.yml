version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aquantis-postgres-prod
    environment:
      POSTGRES_USER: aquantis
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: aquantis
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aquantis"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - aquantis-network

  backend:
    image: ${DOCKER_REGISTRY}/aquantis-backend:latest
    container_name: aquantis-backend-prod
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://aquantis:${DB_PASSWORD}@postgres:5432/aquantis
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      LOG_LEVEL: info
      API_RATE_LIMIT: 1000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - aquantis-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ${DOCKER_REGISTRY}/aquantis-frontend:latest
    container_name: aquantis-frontend-prod
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_APP_NAME: AQUANTIS Global
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - aquantis-network
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local

networks:
  aquantis-network:
    driver: bridge
